apiVersion: apps/v1
kind: Deployment
metadata:
  name: kt30-web
  namespace: kt30
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kt30-web
  template:
    metadata:
      labels:
        app: kt30-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/kt30:latest
          imagePullPolicy: IfNotPresent
          command:
            - gunicorn
            - --bind
            - 0.0.0.0:8000
            - --workers
            - "2"
            - --threads
            - "4"
            - --worker-class
            - gthread
            - --timeout
            - "120"
            - --graceful-timeout
            - "120"
            - app:app
          envFrom:
            - configMapRef:
                name: kt30-config
            - secretRef:
                name: kt30-secrets
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          volumeMounts:
            - name: shared-data
              mountPath: /var/lib/kt30
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: kt30-shared-data
