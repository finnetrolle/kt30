apiVersion: apps/v1
kind: Deployment
metadata:
  name: kt30-worker
  namespace: kt30
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kt30-worker
  template:
    metadata:
      labels:
        app: kt30-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/kt30:latest
          imagePullPolicy: IfNotPresent
          command:
            - python
            - worker.py
          envFrom:
            - configMapRef:
                name: kt30-config
            - secretRef:
                name: kt30-secrets
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            exec:
              command:
                - python
                - ops/healthcheck_worker.py
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - python
                - ops/healthcheck_worker.py
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          volumeMounts:
            - name: shared-data
              mountPath: /var/lib/kt30
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: kt30-shared-data
