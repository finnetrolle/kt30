services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
      - results_data:/app/results_data
      - progress_data:/app/progress_data
      - analysis_runs_data:/app/analysis_runs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  uploads_data:
  results_data:
  progress_data:
  analysis_runs_data:
